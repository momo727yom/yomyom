
<!DOCTYPE html>
<html lang="ko">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사주팔자</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>오늘의 운세</h1>

        </div>
        <div id="fortune-result"></div>
    </div>
    <script src="main.js"></script>
</body>
</html>
